# Add this file to VoidenHQ/plugin-registry at:
#   .github/workflows/notify-docs.yml
#
# Also add a secret in that repo:
#   Settings → Secrets → Actions → New repository secret
#   Name:  DOCS_DISPATCH_TOKEN
#   Value: a GitHub PAT (classic) with `repo` scope for VoidenHQ/docs
#          OR a fine-grained token scoped to VoidenHQ/docs with
#          "Actions" read/write permission.

name: Notify Docs on Registry Change

on:
  push:
    branches:
      - main
    paths:
      - extensions.json   # only fire when the registry itself changes

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'VoidenHQ',
              repo: 'docs',
              event_type: 'plugin-registry-updated',
              client_payload: {
                ref: context.ref,
                sha: context.sha,
              },
            });
